<script>
const SUPABASE_URL='https://oytkdujjwpitzyoiytuo.supabase.co';
const SUPABASE_KEY='sb_publishable_FBIWe2p4CGsMjiwnBqOjew_ELQqx1jv';
// AI calls go through our secure Vercel proxy — no API key in the browser
const AI_PROXY='/api/claude';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const FB=[
  {type:'translate',prompt:'I am tired',answer:'Ami thakke gesi',category:'vocab',source:'fb',hint:'thakke gesi = exhausted'},
  {type:'translate',prompt:'I miss you',answer:'Ami tomar jonno miss korchi',category:'translation',source:'fb'},

  {type:'translate',prompt:'I came home and felt tired',answer:'Ami eshe thakke gesi',category:'chaining',source:'fb',hint:'eshe = having come'},
  {type:'translate',prompt:'I could not come because I had work',answer:'Ami ashte parini karon kaj chilo',category:'connector',source:'fb',hint:'karon = because'},
  {type:'translate',prompt:'It is raining so I will not go',answer:'Brishti hocche tai jabo na',category:'connector',source:'fb',hint:'tai = so'},
  {type:'translate',prompt:'I tried but could not',answer:'Ami cheshta korchilam kintu pari nai',category:'connector',source:'fb',hint:'kintu = but'},
  {type:'flashcard',prompt:'Happy',answer:'Khushi',category:'vocab',source:'fb'},
  {type:'flashcard',prompt:'Worried',answer:'Chintit',category:'vocab',source:'fb'},
  {type:'flashcard',prompt:'I feel lonely',answer:'Amar ekla lage',category:'vocab',source:'fb'},
  {type:'flashcard',prompt:'I love you',answer:'Ami tomake bhalobashi',category:'vocab',source:'fb'},
  {type:'translate',prompt:'If you go I will go too',answer:'Jodi tumi jao ami o jabo',category:'connector',source:'fb',hint:'jodi = if'},
  {type:'translate',prompt:'I ate and then called you',answer:'Ami kheye tomake phone korchilam',category:'chaining',source:'fb',hint:'kheye = having eaten'},
  {type:'translate',prompt:'She came and started cooking',answer:'O eshe ranna shuru korlo',category:'chaining',source:'fb'},
  {type:'conjugate',prompt:'Conjugate "kaj kora" (to work) — ami / tumi / o — past tense',answer:'Ami kaj korechilam / Tumi kaj korechile / O kaj korechilo',category:'conjugation',source:'fb'},
  {type:'conjugate',prompt:'Conjugate "ranna kora" (to cook) — ami / tumi / o — present',answer:'Ami ranna kori / Tumi ranna koro / O ranna kore',category:'conjugation',source:'fb'},
  {type:'translate',prompt:'Are you okay? Do you feel bad?',answer:'Tumi ki theek acho? Tomar ki kharap lage?',category:'translation',source:'fb'},
  {type:'translate',prompt:'I am thinking about you',answer:'Ami tomar kotha bhabchi',category:'translation',source:'fb'},
  {type:'translate',prompt:'What did you do today?',answer:'Ajke tumi ki korecho?',category:'translation',source:'fb'},
  {type:'flashcard',prompt:'Because',answer:'Karon',category:'connector',source:'fb'},
  {type:'flashcard',prompt:'So / that is why',answer:'Tai',category:'connector',source:'fb'},
  {type:'flashcard',prompt:'But',answer:'Kintu',category:'connector',source:'fb'},
  {type:'flashcard',prompt:'If',answer:'Jodi',category:'connector',source:'fb'},
  {type:'flashcard',prompt:'Then / after that',answer:'Tarpor',category:'connector',source:'fb'},
  {type:'translate',prompt:'I sat and studied Bangla',answer:'Ami boshe Bangla porashona korchilam',category:'chaining',source:'fb',hint:'boshe = having sat'},
  {type:'translate',prompt:'I finished work and came home',answer:'Ami kaj sesh kore bashe eshechi',category:'chaining',source:'fb'},
  {type:'conjugate',prompt:'Conjugate "golpo kora" (to chat) — ami / tumi / o — past continuous',answer:'Ami golpo korchilam / Tumi golpo korchile / O golpo korchilo',category:'conjugation',source:'fb'},
  {type:'translate',prompt:'I am happy to be with you',answer:'Tomar shathe theke amar khushi lage',category:'translation',source:'fb'},
  {type:'translate',prompt:'I do not feel well today',answer:'Ami ajke valo feel korchi na',category:'translation',source:'fb'},
];

let S={
  user:null,screen:'auth',tab:'home',authMode:'login',authMsg:null,
  progress:{streak:0,lastDate:null,totalSessions:0,totalCorrect:0,totalAttempted:0},
  weakAreas:{},seenVocab:{},savedDrills:[],customDrills:[],
  sessionMode:null,sessionTime:10,drills:[],lessonMap:{},drillIndex:0,
  session:null,feedbackVisible:false,feedbackData:null,showingLesson:false,sessionError:null,
  contentTab:'add',
};

// ── DB ──────────────────────────────────────────────────────
async function dbLoad(){
  if(!S.user)return;
  const uid=S.user.id;
  const [{data:prog},{data:weak},{data:vocab},{data:drills}]=await Promise.all([
    sb.from('progress').select('*').eq('user_id',uid).single(),
    sb.from('weak_areas').select('*').eq('user_id',uid),
    sb.from('seen_vocab').select('*').eq('user_id',uid),
    sb.from('drills').select('*').eq('user_id',uid),
  ]);
  if(prog)S.progress={streak:prog.streak||0,lastDate:prog.last_date,totalSessions:prog.total_sessions||0,totalCorrect:prog.total_correct||0,totalAttempted:prog.total_attempted||0};
  if(weak){S.weakAreas={};weak.forEach(w=>{S.weakAreas[w.category]={right:w.right_count,wrong:w.wrong_count};});}
  if(vocab){S.seenVocab={};vocab.forEach(v=>{S.seenVocab[v.vocab_key]=v.seen_at;});}
  if(drills){
    S.savedDrills=drills.filter(d=>d.source==='doc').map(d=>({type:d.type,prompt:d.prompt,answer:d.answer,category:d.category,hint:d.hint,source:'doc'}));
    S.customDrills=drills.filter(d=>d.source==='custom').map(d=>({id:d.id,type:d.type,prompt:d.prompt,answer:d.answer,category:d.category,hint:d.hint,source:'custom'}));
  }
}

async function dbSaveProgress(){
  if(!S.user)return;
  await sb.from('progress').upsert({user_id:S.user.id,streak:S.progress.streak,last_date:S.progress.lastDate,total_sessions:S.progress.totalSessions,total_correct:S.progress.totalCorrect,total_attempted:S.progress.totalAttempted,updated_at:new Date().toISOString()},{onConflict:'user_id'});
}

async function dbSaveWeakArea(cat){
  if(!S.user||!S.weakAreas[cat])return;
  const w=S.weakAreas[cat];
  await sb.from('weak_areas').upsert({user_id:S.user.id,category:cat,right_count:w.right,wrong_count:w.wrong},{onConflict:'user_id,category'});
}

async function dbMarkSeen(key){
  if(!S.user)return;
  await sb.from('seen_vocab').upsert({user_id:S.user.id,vocab_key:key,seen_at:new Date().toISOString()},{onConflict:'user_id,vocab_key'});
}

async function dbSaveDrills(drills,source){
  if(!S.user)return;
  await sb.from('drills').delete().eq('user_id',S.user.id).eq('source',source);
  if(!drills.length)return;
  await sb.from('drills').insert(drills.map(d=>({user_id:S.user.id,prompt:d.prompt,answer:d.answer,type:d.type,category:d.category||null,hint:d.hint||null,source})));
}

async function dbAddCustomDrill(d){
  if(!S.user)return null;
  const {data}=await sb.from('drills').insert({user_id:S.user.id,prompt:d.prompt,answer:d.answer,type:d.type,category:d.category||null,hint:d.hint||null,source:'custom'}).select().single();
  return data;
}

async function dbDeleteDrill(id){
  if(!S.user)return;
  await sb.from('drills').delete().eq('id',id).eq('user_id',S.user.id);
}

// ── AI ──────────────────────────────────────────────────────
async function callAI(sys,usr){
  const r=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:[{role:'user',content:usr}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const t=d.content?.[0]?.text||'';if(!t)throw new Error('empty');return t;
}

async function genDrills(count,focus,mixed){
  const types=mixed?'mix flashcard/translate/conjugate':'translate and conjugate';
  const t=await callAI('Dhaka Bengali drill generator. Return ONLY valid JSON array. No markdown.',
    `Generate ${count} Dhaka Bengali drills. Tumi forms. Past: korchilam/korechilam NOT korsilam. Focus:${focus}. Types:${types}. Daily life family emotions food chaining connectors. Each:{type,prompt,answer,category,hint}. NO duplicate prompts.`);
  const arr=JSON.parse(t.replace(/```json|```/g,'').trim());
  if(!Array.isArray(arr)||!arr.length)throw new Error('bad');
  return arr.map(d=>({...d,source:'ai'}));
}

async function genLesson(drill){
  try{
    const t=await callAI('Dhaka Bengali tutor. Return ONLY valid JSON, no markdown.',
      `Mini lesson for this drill.\nPrompt:"${drill.prompt}" Answer:"${drill.answer}" Category:${drill.category||'vocab'}\nReturn JSON:{word,meaning,grammarNote,example:{bn,en},conversationTip} — conversationTip should end with 2 lines prefixed Jesse: and Anisha:`);
    return JSON.parse(t.replace(/```json|```/g,'').trim());
  }catch(e){
    return{word:drill.answer,meaning:drill.prompt,grammarNote:'Practice this in a full sentence.',example:{bn:drill.answer,en:drill.prompt},conversationTip:`Try using this with Anisha.\nJesse: ${drill.answer}\nAnisha: [response]`};
  }
}

async function checkAnswer(drill,ans){
  try{
    const t=await callAI('Dhaka Bengali tutor. ONLY JSON: {"correct":true/false,"feedback":"max 2 sentences","correctAnswer":"ideal"}. Lenient romanization. Tumi forms -chil- past korchilam not korsilam.',`Type:${drill.type}\nPrompt:${drill.prompt}\nExpected:${drill.answer}\nStudent:${ans}`);
    return JSON.parse(t.replace(/```json|```/g,'').trim());
  }catch(e){
    const a=ans.toLowerCase().trim(),e2=drill.answer.toLowerCase().trim();
    const ok=a===e2||e2.includes(a)||(a.length>4&&e2.includes(a.slice(0,Math.floor(a.length*.8))));
    return{correct:ok,feedback:ok?'Correct!':'Not quite — see the correct answer below.',correctAnswer:drill.answer};
  }
}

// ── SESSION ─────────────────────────────────────────────────
function dedupe(arr){const s=new Set();return arr.filter(d=>{const k=d.prompt.toLowerCase().trim();if(s.has(k))return false;s.add(k);return true;});}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function setLoad(t,s,p){document.getElementById('lo-title').textContent=t;document.getElementById('lo-sub').textContent=s;document.getElementById('lo-bar').style.width=p+'%';}

function getFallback(mode,count){
  let p=[...FB,...S.customDrills];
  if(mode==='flashcard')p=p.filter(d=>d.type==='flashcard');
  else if(mode==='translate')p=p.filter(d=>d.type==='translate');
  else if(mode==='conjugate')p=p.filter(d=>['conjugate','translate'].includes(d.type));
  shuf(p);while(p.length<count&&p.length>0)p=[...p,...p];
  return dedupe(p).slice(0,count);
}

async function buildSession(mode,mins){
  const count=Math.max(5,Math.floor(mins*1.5));
  const isMix=mode==='mixed'||mode==='focus';
  const all=[...S.savedDrills,...S.customDrills];
  let pool=[];
  setLoad('Building drills…','Pulling from your saved content',10);
  if(all.length){
    let f=[...all];
    const wc=Object.entries(S.weakAreas).filter(([,v])=>v.wrong>v.right).map(([k])=>k);
    if(mode==='focus'&&wc.length){const w=f.filter(d=>wc.includes(d.category));f=[...w,...f.filter(d=>!wc.includes(d.category))];}
    if(mode==='flashcard')f=f.filter(d=>d.type==='flashcard');
    else if(mode==='translate')f=f.filter(d=>d.type==='translate');
    else if(mode==='conjugate')f=f.filter(d=>['conjugate','translate'].includes(d.type));
    pool=f.slice(0,Math.ceil(count*.5));
  }
  const need=count-pool.length;
  if(need>0){
    setLoad('Generating drills…','Creating AI content',30);
    const wc=Object.entries(S.weakAreas).filter(([,v])=>v.wrong>v.right).map(([k])=>k);
    const focus=mode==='focus'&&wc.length?wc.join(', '):mode==='conjugate'?'kora verb conjugation':mode==='translate'?'sentence translation connectors chaining':mode==='mixed'?'vocab translation conjugation connectors chaining':'conversational daily phrases';
    try{pool=[...pool,...await genDrills(need,focus,isMix)];}
    catch(e){pool=[...pool,...getFallback(mode,need)];}
  }
  pool=dedupe(pool);shuf(pool);
  if(!pool.length)throw new Error('No drills available');
  setLoad('Preparing lessons…','Checking for new vocabulary',55);
  const lessonMap={};
  const newOnes=pool.filter(d=>!S.seenVocab[d.prompt.toLowerCase().trim()]).slice(0,5);
  for(let i=0;i<newOnes.length;i++){
    const d=newOnes[i];
    setLoad('Preparing lessons…',`Lesson ${i+1} of ${newOnes.length}: "${d.prompt}"`,55+Math.round((i/newOnes.length)*35));
    lessonMap[d.prompt.toLowerCase().trim()]=await genLesson(d);
  }
  setLoad('Almost ready…','Finalising',95);
  return{drills:pool,lessonMap};
}

function updateStreak(){
  const today=new Date().toDateString();
  if(S.progress.lastDate!==today){
    const y=new Date(Date.now()-86400000).toDateString();
    S.progress.streak=S.progress.lastDate===y?(S.progress.streak||0)+1:1;
    S.progress.lastDate=today;
  }
}

function updateWeak(cat,ok){
  if(!cat)return;
  if(!S.weakAreas[cat])S.weakAreas[cat]={right:0,wrong:0};
  if(ok)S.weakAreas[cat].right++;else S.weakAreas[cat].wrong++;
  dbSaveWeakArea(cat);
}

async function doAuth(){

  const d={type:document.getElementById('ct')?.value||'flashcard',prompt:p,answer:ans,category:document.getElementById('cc')?.value||'vocab',hint:(document.getElementById('ch')?.value||'').trim()||undefined,source:'custom'};
  const saved=await dbAddCustomDrill(d);
  if(saved)d.id=saved.id;
  S.customDrills.push(d);S.contentTab='browse';render();
}

async function delC(id,idx){
  if(id)await dbDeleteDrill(id);
  S.customDrills.splice(idx,1);render();
}

async function genTopic(){
  const topic=(document.getElementById('topic')?.value||'').trim();if(!topic)return;
  const btn=document.getElementById('topicbtn'),st=document.getElementById('tst');
  btn.disabled=true;st.textContent='Generating…';
  try{
    const t=await callAI('Dhaka Bengali drill generator. Return ONLY valid JSON array. No markdown.',`Generate 8 conversational Dhaka Bengali practice drills for: "${topic}"\nTumi forms. Past: korchilam not korsilam. Mix flashcard/translate/conjugate.\nJSON:[{type,prompt,answer,category,hint}]`);
    const arr=JSON.parse(t.replace(/```json|```/g,'').trim());
    for(const d of arr.map(d=>({...d,source:'custom'}))){
      const saved=await dbAddCustomDrill(d);if(saved)d.id=saved.id;S.customDrills.push(d);
    }
    st.textContent=`✓ Added ${arr.length} drills`;
    setTimeout(()=>{S.contentTab='browse';render();},600);
  }catch(e){st.textContent='Could not generate — try again.';btn.disabled=false;}
}

// ── SYNC ────────────────────────────────────────────────────
function parseDoc(text){
  const out=[];
  text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    const v=line.match(/^([a-zA-Z\s]{2,35})\s*[=\/]\s*(.{2,55})$/);
    if(v){out.push({type:'flashcard',prompt:v[2].trim(),answer:v[1].trim(),category:'vocab',source:'doc'});out.push({type:'flashcard',prompt:v[1].trim(),answer:v[2].trim(),category:'vocab',source:'doc'});}
    const s=line.match(/^(.{10,60})\s*=\s*(.{5,80})$/);
    if(s&&s[1].includes(' ')&&s[2].includes(' '))out.push({type:'translate',prompt:s[2].trim(),answer:s[1].trim(),category:'translation',source:'doc'});
  });
  return dedupe(out).slice(0,80);
}

function rSync(a){
  a.innerHTML=`
    <div class="header"><span class="header-title">Doc sync</span></div>
    <div class="sec">
      <div class="sec-label">Paste your Google Doc content</div>
      <div class="card" style="margin-bottom:12px;font-size:13px;color:#aaa;line-height:1.6">
        Open your Google Doc → Edit → Select all → Copy → Paste below.<br><br>
        ${S.savedDrills.length?`<span style="color:#2a9">✓ ${S.savedDrills.length} drills synced.</span> Re-syncing replaces them.`:'No doc synced yet.'}
      </div>
      <textarea class="ta" id="di" placeholder="Paste lesson content here…"></textarea>
      <button class="sbtn" id="syncbtn" onclick="syncDoc()">Parse and sync</button>
      <div id="sst" class="sstatus"></div>
    </div>`;
}

async function syncDoc(){
  const text=(document.getElementById('di')?.value||'').trim();if(!text)return;
  const btn=document.getElementById('syncbtn'),st=document.getElementById('sst');
  btn.disabled=true;st.textContent='Parsing…';
  const basic=parseDoc(text);st.textContent='Running AI extraction…';
  try{
    const t=await callAI('Bangla lesson parser. Return ONLY JSON array no markdown.',`Extract up to 50 drills. Tumi forms -chil- past korchilam not korsilam. Types:flashcard/translate/conjugate. Fields:type,prompt,answer,category,hint. NO duplicates.\nLesson:\n${text.slice(0,3500)}`);
    const arr=JSON.parse(t.replace(/```json|```/g,'').trim());
    S.savedDrills=dedupe([...basic,...arr.map(d=>({...d,source:'doc'}))]).slice(0,120);
  }catch(e){S.savedDrills=basic;}
  st.textContent='Saving to your account…';
  await dbSaveDrills(S.savedDrills,'doc');
  st.textContent=`✓ ${S.savedDrills.length} drills synced`;btn.disabled=false;
}

// ── ACCOUNT ─────────────────────────────────────────────────
function rAccount(a){
  a.innerHTML=`
    <div class="header"><span class="header-title">Account</span></div>
    <div class="sec">
      <div class="card" style="margin-bottom:14px">
        <div style="font-size:13px;color:#aaa;margin-bottom:4px">Signed in as</div>
        <div style="font-size:15px;font-weight:500">${S.user?.email||''}</div>
      </div>
      <div class="card" style="font-size:13px;color:#aaa;line-height:1.7;margin-bottom:14px">
        Progress, drills and vocab sync across all devices. Sign in with the same account anywhere to access everything.
      </div>
      <button class="btn danger" onclick="signOut()">Sign out</button>
    </div>`;
}

async function signOut(){
  await sb.auth.signOut();
  Object.assign(S,{user:null,screen:'auth',authMode:'login',authMsg:null,progress:{streak:0,lastDate:null,totalSessions:0,totalCorrect:0,totalAttempted:0},weakAreas:{},seenVocab:{},savedDrills:[],customDrills:[]});
  document.getElementById('root').innerHTML='';render();
}

// ── INIT ────────────────────────────────────────────────────
async function init(){
  document.getElementById('root').innerHTML=`<div style="position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;font-size:40px">🇧🇩</div>`;
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){
    S.user=session.user;await dbLoad();S.screen='home';S.tab='home';
    document.getElementById('root').innerHTML=`<div class="app" id="app"></div><nav class="nav" id="nav"></nav>`;
  }else{
    S.screen='auth';document.getElementById('root').innerHTML='';
  }
  render();
}
init();
</script>
